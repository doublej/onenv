name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  manager:
    name: onenv-manager
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onenv-manager
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run biome check src/
      - run: bunx tsc --noEmit
      - run: bun run test run

  api:
    name: onenv-api
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: onenv-api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run biome check src/
      - run: bunx tsc --noEmit
      - run: bun run test run
